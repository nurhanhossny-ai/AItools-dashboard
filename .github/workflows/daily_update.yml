name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 7 * * *'   # runs every day at 07:00 UTC (10:00 Cairo time)
  workflow_dispatch:        # lets you trigger it manually from GitHub Actions tab

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update timestamp in dashboard
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          # Update the "Updated daily via GitHub Actions" footer timestamp
          sed -i "s/Updated daily via GitHub Actions/Updated: $DATE via GitHub Actions/" index.html

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: daily dashboard refresh ${{ github.run_number }}"
          git push
